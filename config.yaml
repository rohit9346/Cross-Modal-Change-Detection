# ─────────────────────────────────────────────────────────────────────────────
# GalaxEye Space — Binary Change Detection
# V5 Configuration — Primary Submission
# Candidate: Rohit Robert | May 2026
# ─────────────────────────────────────────────────────────────────────────────

# ── Dataset ──────────────────────────────────────────────────────────────────
dataset:
  base_dir: "/kaggle/input/datasets/rohitrobertc2/galaxyeye-change-detection-v2"
  splits:
    train:
      pre:    "train/pre-event"
      post:   "train/post-event"
      target: "train/target"
    val:
      pre:    "change_detection_assignment_data/val/pre-event"
      post:   "change_detection_assignment_data/val/post-event"
      target: "change_detection_assignment_data/val/target"
    test:
      pre:    "change_detection_assignment_data/test/pre-event"
      post:   "change_detection_assignment_data/test/post-event"
      target: "change_detection_assignment_data/test/target"
  counts:
    train: 2781
    val: 334
    test: 77
  label_remapping: "np.where(mask >= 2, 1, 0)"  # 0=background,1=intact → 0 | 2+=change → 1

# ── Input Channels ───────────────────────────────────────────────────────────
channels:
  count: 9
  description:
    - index: 0-2
      name: "EO RGB"
      formula: "pre / 255.0"
      range: "[0, 1]"
    - index: 3
      name: "SAR"
      formula: "(post - 1) / 230.0"
      range: "[0, 1]"
    - index: 4
      name: "EO Luminance"
      formula: "0.299*R + 0.587*G + 0.114*B"
      range: "[0, 1]"
    - index: 5
      name: "Cross Diff"
      formula: "SAR_norm - EO_lum"
      range: "[-1, 1]"
      note: "+ve=rubble, -ve=flood, ~0=no change"
    - index: 6
      name: "Cross Abs"
      formula: "abs(Cross Diff)"
      range: "[0, 1]"
    - index: 7
      name: "NGRDI"
      formula: "(G - R) / (G + R + 1e-8), then (x + 1.0) / 2.0"
      range: "[0, 1]"
      note: "Normalised Green-Red Difference Index — vegetation health proxy (no NIR available)"
    - index: 8
      name: "SAR-NGRDI"
      formula: "SAR_norm * (1 - NGRDI_norm)"
      range: "[0, 1]"
      note: "Compound destruction: high radar + vegetation loss"

# ── Architecture ─────────────────────────────────────────────────────────────
model:
  name: "ResNet34UNet"
  in_channels: 9
  num_classes: 1
  encoder: "resnet34"
  encoder_weights: "imagenet"
  decoder: "unet"
  output: "raw_logits"
  note: "Pure PyTorch — segmentation_models_pytorch NOT used (crashes Kaggle Python 3.12)"

# ── Loss Function ─────────────────────────────────────────────────────────────
loss:
  name: "FocalTverskyLoss"
  alpha: 0.3       # FP penalty — low (false alarms acceptable in disaster triage)
  beta: 0.7        # FN penalty — high (missing damage is operationally critical)
  gamma: 1.33      # CRITICAL: correct value from Abraham & Khan 2019. 0.75 inverts focal mechanism.
  smooth: 1.0      # Prevents div-by-zero on all-zero masks

# ── Optimiser ────────────────────────────────────────────────────────────────
optimizer:
  name: "AdamW"
  encoder_lr: 1.0e-5    # Pretrained encoder — slow updates (100x lower than decoder)
  decoder_lr: 1.0e-3    # Randomly initialised decoder — full learning rate
  weight_decay: 1.0e-4

# ── Scheduler ────────────────────────────────────────────────────────────────
scheduler:
  name: "CosineAnnealingLR"
  T_max: 50
  eta_min: 1.0e-6

# ── Training ─────────────────────────────────────────────────────────────────
training:
  seed: 42
  batch_size: 8
  num_epochs: 60
  num_workers: 2
  pin_memory: true
  input_size: 1024          # Full resolution — V3 experiment proved 1024 > 512 crops
  checkpoint: "best_v5.pth"
  early_stopping_patience: 10
  early_stopping_metric: "val_iou"

# ── Sampler ───────────────────────────────────────────────────────────────────
sampler:
  name: "WeightedRandomSampler"
  pos_weight: 3.0           # Change-positive tiles sampled 3x — matches 2068:713 class ratio
  replacement: true

# ── Augmentation ─────────────────────────────────────────────────────────────
augmentation:
  train:
    - name: "HorizontalFlip"
      p: 0.5
    - name: "VerticalFlip"
      p: 0.5
    - name: "RandomRotate90"
      p: 0.5
    - name: "EO Brightness"
      factor_range: [0.75, 1.25]
      applies_to: "pre-event EO only"
      note: "SAR channels untouched — backscatter values are physically meaningful"
  val_test:
    - name: "CenterCrop"
      size: 1024
  note: "is_check_shapes=False always set in A.Compose"

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  threshold: 0.4            # Lowered from 0.5 — FTL with beta=0.7 calibrates below 0.5
  tta: true
  tta_transforms:
    - "original"
    - "horizontal_flip"
    - "vertical_flip"
    - "horizontal_and_vertical_flip"
  tta_aggregation: "mean"
  metrics:
    - "IoU"
    - "Precision"
    - "Recall"
    - "F1"
  metric_class: 1           # Change class only
  accumulation: "batch"     # Accumulate TP/FP/FN/TN across ALL batches, then compute

# ── Results (V5 — Primary Submission) ────────────────────────────────────────
results:
  validation:
    iou: 0.4906
    precision: 0.6656
    recall: 0.6511
    f1: 0.6583
    loss: 0.7081
    tp: 5017260
    fp: 2520150
    fn: 2688913
    tn: 339998061
  test:
    iou: 0.0080
    precision: 0.0276
    recall: 0.0111
    f1: 0.0159
    loss: 0.9847
    tp: 6781
    fp: 239085
    fn: 602413
    tn: 79892073
    note: "Scene_09 is unseen geography — geographic domain shift, not a code error"
